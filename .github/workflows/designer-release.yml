name: Designer Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Check out Designer repo
        uses: actions/checkout@v4
        with:
          path: EmbeddedGUI_Designer
          submodules: recursive
          fetch-depth: 0

      - name: Show pinned SDK revision
        working-directory: EmbeddedGUI_Designer
        run: |
          git -C sdk/EmbeddedGUI rev-parse HEAD
          git -C sdk/EmbeddedGUI config --get remote.origin.url

      - name: Capture repository health
        working-directory: EmbeddedGUI_Designer
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          python scripts/ui_designer/repo_doctor.py --strict --json > build/repo-health.json

      - name: Setup C/C++ env
        uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: EmbeddedGUI_Designer
        run: |
          python -m pip install -r ui_designer/requirements-desktop.txt
          python -m pip install pyinstaller

      - name: Build Windows package
        working-directory: EmbeddedGUI_Designer
        run: >
          python scripts/package_ui_designer.py
          --sdk-root sdk/EmbeddedGUI
          --output-dir dist
          --work-dir build/pyinstaller
          --archive zip
          --package-suffix "${{ github.ref_name }}"

      - name: Inspect packaged metadata
        working-directory: EmbeddedGUI_Designer
        run: >
          python scripts/ui_designer/inspect_release.py
          dist/EmbeddedGUI-Designer
          --json
          > dist/designer-package-metadata.json

      - name: Write release checksums
        working-directory: EmbeddedGUI_Designer
        run: |
          $assetPaths = @()
          $zipAsset = Get-ChildItem dist -Filter '*.zip' | Select-Object -First 1
          if (-not $zipAsset) {
            throw "Packaged zip not found in dist/"
          }
          $assetPaths += (Resolve-Path $zipAsset.FullName).Path
          $assetPaths += (Resolve-Path "dist/designer-package-metadata.json").Path
          $assetPaths += (Resolve-Path "build/repo-health.json").Path

          $checksumLines = foreach ($assetPath in $assetPaths) {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $assetPath
            "$($hash.Hash.ToLower())  $([System.IO.Path]::GetFileName($assetPath))"
          }

          Set-Content -LiteralPath "dist/SHA256SUMS.txt" -Value $checksumLines

      - name: Publish GitHub release
        working-directory: EmbeddedGUI_Designer
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_NAME: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $zipAsset = Get-ChildItem dist -Filter '*.zip' | Select-Object -First 1
          if (-not $zipAsset) {
            throw "Packaged zip not found in dist/"
          }

          $assets = @(
            (Resolve-Path $zipAsset.FullName).Path
            (Resolve-Path "dist/designer-package-metadata.json").Path
            (Resolve-Path "dist/SHA256SUMS.txt").Path
            (Resolve-Path "build/repo-health.json").Path
          )

          gh release view $env:TAG_NAME --repo $env:REPO_NAME --json id 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $assets --repo $env:REPO_NAME --clobber
          } else {
            gh release create $env:TAG_NAME $assets --repo $env:REPO_NAME --title "EmbeddedGUI Designer $env:TAG_NAME" --generate-notes --verify-tag
          }
