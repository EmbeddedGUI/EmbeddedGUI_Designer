name: Designer Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional package suffix, such as v0.1.0
        required: false
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: designer-windows-x64
          - os: ubuntu-22.04
            artifact_name: designer-linux-x64
          - os: macos-latest
            artifact_name: designer-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out Designer repo
        uses: actions/checkout@v4
        with:
          path: EmbeddedGUI_Designer
          submodules: recursive
          fetch-depth: 0

      - name: Show pinned SDK revision
        working-directory: EmbeddedGUI_Designer
        run: |
          git -C sdk/EmbeddedGUI rev-parse HEAD
          git -C sdk/EmbeddedGUI config --get remote.origin.url

      - name: Capture repository health
        working-directory: EmbeddedGUI_Designer
        run: >
          python scripts/ui_designer/repo_doctor.py
          --strict
          --json
          > build/repo-health.json

      - name: Setup C/C++ env (Windows)
        if: runner.os == 'Windows'
        uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 \
            libxkbcommon-x11-0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libegl1

      - name: Install Python dependencies
        working-directory: EmbeddedGUI_Designer
        run: |
          python -m pip install -r ui_designer/requirements-desktop.txt
          python -m pip install pyinstaller

      - name: Build package
        working-directory: EmbeddedGUI_Designer
        run: >
          python scripts/package_ui_designer.py
          --sdk-root sdk/EmbeddedGUI
          --output-dir dist
          --work-dir build/pyinstaller
          --archive auto
          --package-suffix "${{ inputs.version }}"

      - name: Inspect packaged metadata
        working-directory: EmbeddedGUI_Designer
        run: >
          python scripts/ui_designer/inspect_release.py
          dist/EmbeddedGUI-Designer
          --json
          > dist/designer-package-metadata.json

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            EmbeddedGUI_Designer/build/repo-health.json
            EmbeddedGUI_Designer/dist/*.zip
            EmbeddedGUI_Designer/dist/*.tar.gz
            EmbeddedGUI_Designer/dist/designer-package-metadata.json
          retention-days: 7
