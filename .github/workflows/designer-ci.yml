name: Designer CI

on:
  push:
  pull_request:

jobs:
  test-and-smoke:
    runs-on: windows-latest
    steps:
      - name: Check out Designer repo
        uses: actions/checkout@v4
        with:
          path: EmbeddedGUI_Designer

      - name: Check out EmbeddedGUI SDK
        uses: actions/checkout@v4
        with:
          repository: EmbeddedGUI/EmbeddedGUI
          ref: main
          path: EmbeddedGUI

      - name: Setup C/C++ env
        uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: EmbeddedGUI_Designer
        run: python -m pip install -r ui_designer/requirements-desktop.txt

      - name: Run UI Designer tests
        working-directory: EmbeddedGUI_Designer
        run: python -m pytest -c ui_designer/pyproject.toml ui_designer/tests -v --tb=short

      - name: Run UI Designer live preview smoke
        working-directory: EmbeddedGUI_Designer
        run: python ui_designer_preview_smoke.py --sdk-root ../EmbeddedGUI
