name: Designer CI

on:
  push:
  pull_request:

jobs:
  test-and-smoke:
    runs-on: windows-latest
    steps:
      - name: Check out Designer repo
        uses: actions/checkout@v4
        with:
          path: EmbeddedGUI_Designer
          submodules: recursive
          fetch-depth: 0

      - name: Show pinned SDK revision
        working-directory: EmbeddedGUI_Designer
        run: |
          git -C sdk/EmbeddedGUI rev-parse HEAD
          git -C sdk/EmbeddedGUI config --get remote.origin.url

      - name: Setup C/C++ env
        uses: rlalik/setup-cpp-compiler@v1.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: EmbeddedGUI_Designer
        run: python -m pip install -r ui_designer/requirements-desktop.txt

      - name: Run UI Designer tests
        working-directory: EmbeddedGUI_Designer
        run: python scripts/ui_designer/run_pytest.py

      - name: Run UI Designer live preview smoke
        working-directory: EmbeddedGUI_Designer
        run: python ui_designer_preview_smoke.py --sdk-root sdk/EmbeddedGUI

      - name: Run UI Designer release smoke
        working-directory: EmbeddedGUI_Designer
        run: >
          python scripts/ui_designer/release_project.py
          --project samples/release_smoke/ReleaseSmokeApp
          --sdk-root sdk/EmbeddedGUI
          --output-dir build/release-smoke
          --json
